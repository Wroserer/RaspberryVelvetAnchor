<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raspberry Velvet Anchor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, sans-serif;
    overflow: hidden;
  }

  /* === Ambient drifting color orbs === */
  .orb {
    position: fixed;
    width: 520px;
    height: 520px;
    border-radius: 50%;
    filter: blur(130px);
    opacity: 0.22;
    pointer-events: none;
    z-index: 0;
  }
  .orb-1 { background: #ff006e; top: -220px; left: -220px; animation: drift1 22s ease-in-out infinite; }
  .orb-2 { background: #3a86ff; bottom: -220px; right: -220px; animation: drift2 26s ease-in-out infinite; }
  .orb-3 { background: #8338ec; top: 35%; right: -180px; animation: drift3 19s ease-in-out infinite; }
  .orb-4 { background: #06d6a0; bottom: 30%; left: -200px; animation: drift4 24s ease-in-out infinite; }

  @keyframes drift1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(120px, 90px); } }
  @keyframes drift2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-130px,-110px); } }
  @keyframes drift3 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-220px, 120px); } }
  @keyframes drift4 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(180px,-90px); } }

  /* === Layout === */
  main {
    position: relative;
    z-index: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 56px;
    padding: 32px;
  }

  /* === Title with animated rainbow === */
  .title {
    font-size: clamp(2.5rem, 7.5vw, 6rem);
    font-weight: 800;
    letter-spacing: -0.04em;
    text-align: center;
    line-height: 1.05;
    background: linear-gradient(90deg, #ff006e, #fb5607, #ffbe0b, #06d6a0, #3a86ff, #8338ec, #ff006e);
    background-size: 200% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: rainbow-shift 6s linear infinite;
    filter: drop-shadow(0 0 40px rgba(255, 0, 110, 0.35));
  }

  @keyframes rainbow-shift {
    0%   { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
  }

  /* === Reusable rainbow border === */
  .rainbow-border {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
  }
  .rainbow-border::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1.5px;
    background: linear-gradient(90deg, #ff006e, #fb5607, #ffbe0b, #06d6a0, #3a86ff, #8338ec, #ff006e);
    background-size: 200% 100%;
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    animation: rainbow-shift 5s linear infinite;
    pointer-events: none;
    z-index: 2;
  }

  /* === IP box === */
  .ip-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 22px 44px;
    background: rgba(255, 255, 255, 0.03);
    cursor: pointer;
    transition: transform 0.2s ease, background 0.2s ease;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  .ip-box:hover {
    transform: translateY(-2px);
    background: rgba(255, 255, 255, 0.06);
  }
  .ip-box:active { transform: translateY(0); }
  .ip-label {
    font-size: 0.7rem;
    letter-spacing: 0.32em;
    color: #888;
    text-transform: uppercase;
  }
  .ip-value {
    font-family: "SF Mono", "JetBrains Mono", Menlo, Monaco, "Courier New", monospace;
    font-size: 1.45rem;
    font-weight: 600;
    color: #fff;
    user-select: all;
  }
  .copy-hint {
    font-size: 0.75rem;
    color: #666;
    transition: color 0.2s ease;
    margin-top: 4px;
  }
  .ip-box.copied .copy-hint { color: #06d6a0; }

  /* === Download button === */
  .download-btn {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 14px;
    padding: 18px 40px;
    font-size: 1.05rem;
    font-weight: 600;
    color: #fff;
    text-decoration: none;
    background: rgba(255, 255, 255, 0.04);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s ease, background 0.2s ease;
  }
  .download-btn:hover {
    transform: translateY(-2px);
    background: rgba(255, 255, 255, 0.08);
  }
  .download-btn:active { transform: translateY(0); }
  .download-btn .arrow {
    display: inline-block;
    transition: transform 0.4s ease;
    position: relative;
    z-index: 1;
  }
  .download-btn:hover .arrow { transform: translateY(3px); }
  .download-btn span.label { position: relative; z-index: 1; }

  /* Progress fill on click */
  .download-btn .progress {
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, rgba(255, 0, 110, 0.45), rgba(131, 56, 236, 0.45), rgba(58, 134, 255, 0.45));
    transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 0;
  }
  .download-btn.downloading .progress { width: 100%; }
  .download-btn.downloading .arrow { animation: bounce 0.6s ease infinite; }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(6px); }
  }
</style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>

  <main>
    <h1 class="title">Raspberry Velvet Anchor</h1>

    <div class="ip-box rainbow-border" onclick="copyIp(this)">
      <span class="ip-label">Server IP</span>
      <span class="ip-value">185.83.155.31:25573</span>
      <span class="copy-hint">click to copy</span>
    </div>

    <!-- Replace href with the real modpack URL or keep modpack.zip next to this file -->
    <a href="RVA Modpack-1.0.zip" class="download-btn rainbow-border" download onclick="startDownload(this)">
      <div class="progress"></div>
      <span class="label">Download Modpack</span>
      <span class="arrow">↓</span>
    </a>
  </main>

  <script>
    const SERVER_IP = '185.83.155.31:25573';

    function copyIp(box) {
      const hint = box.querySelector('.copy-hint');
      const setCopied = () => {
        box.classList.add('copied');
        hint.textContent = '✓ copied!';
        setTimeout(() => {
          box.classList.remove('copied');
          hint.textContent = 'click to copy';
        }, 1800);
      };

      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(SERVER_IP).then(setCopied).catch(fallback);
      } else {
        fallback();
      }

      function fallback() {
        const tmp = document.createElement('textarea');
        tmp.value = SERVER_IP;
        tmp.style.position = 'fixed';
        tmp.style.opacity = '0';
        document.body.appendChild(tmp);
        tmp.select();
        try { document.execCommand('copy'); } catch (e) {}
        document.body.removeChild(tmp);
        setCopied();
      }
    }

    function startDownload(btn) {
      btn.classList.add('downloading');
      setTimeout(() => btn.classList.remove('downloading'), 1500);
    }
  </script>
</body>
</html>
